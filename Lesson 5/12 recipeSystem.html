<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        #recipeWrap {
            min-height: 20vh;
            background-color: #f1f4ff;
            border-radius: 0.4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }

        #ingredients {
            min-height: 10vh;
            background-color: white;
            width: 60%;
            color: rgb(39, 21, 21);
            border: 1px black solid;
            border-radius: 0.4rem;
            padding: 2rem;
        }

        .ingredientRow {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
        }

        #btnAddIngredient {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background-color: #4f7cff;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btnAddIngredient:hover {
            background-color: #3a5dcc;
            transform: scale(1.1);
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.2);
        }

        .deleteRowButton {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background-color: #ff4f4f;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;

        }

        .deleteRowButton:hover {
            background-color: #cc3a3a;
            transform: scale(1.1);
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.2);
        }


    </style>

</head>

<body>

    <h1>Recipe maker</h1>

    <div id="recipeWrap">

        <input type="text" id="recipeName" placeholder="name of the recipe">

        <div id="ingredients">

        </div>
        <button id="btnAddIngredient">+</button>

        <h2 id="totalCalories">Total calories: </h2>


    </div>

    <script>

        class Food {

            constructor(name, weightSuggestion, caloriesPerGram, protein, carbs, vegan, vegetarian, glutenFree, lactoseFree, carnivore) {

                this.name = name;
                this.weightSuggestion = weightSuggestion;
                this.caloriesPerGram = caloriesPerGram;
                this.protein = protein;
                this.carbs = carbs;
                this.vegan = vegan;
                this.vegetarian = vegetarian;
                this.glutenFree = glutenFree;
                this.lactoseFree = lactoseFree;
                this.carnivore = carnivore;

            }

            //simple method for calculating calories. We need the grams as an argument, because the calories per gram is a property of the food, but the total calories depends on how much of that food we are using 
            getCalories(grams) {
                return grams * this.caloriesPerGram;
            }
        }

        const foods = [
            new Food('tomato', 150, 0.18, 0.009, 0, true, true, true, true, false),
            new Food('chicken breast', 200, 1.65, 0.31, 0, false, false, true, true, true),
            new Food('white rice', 180, 1.3, 0.027, 0, true, true, true, true, false),
            new Food('pasta', 180, 1.31, 0.05, 0, true, true, false, true, false),
            new Food('cheddar cheese', 50, 4.02, 0.25, 0, false, true, true, false, true),
            new Food('milk', 200, 0.42, 0.034, 0, false, true, true, false, true),
            new Food('egg', 60, 1.55, 0.13, 0, false, true, true, true, true),
            new Food('beef', 200, 2.5, 0.26, 0, false, false, true, true, true),
            new Food('salmon', 180, 2.08, 0.2, 0, false, false, true, true, true),
            new Food('potato', 200, 0.77, 0.02, 0, true, true, true, true, false),
            new Food('carrot', 100, 0.41, 0.009, 0, true, true, true, true, false),
            new Food('onion', 80, 0.4, 0.011, 0, true, true, true, true, false),
            new Food('bread', 80, 2.65, 0.09, 0, true, true, false, true, false),
            new Food('olive oil', 10, 8.84, 0, 0, true, true, true, true, false)
        ];

        const ingredients = document.getElementById('ingredients');

        function createIngredientRow() {

            const row = document.createElement('div');
            row.className = 'ingredientRow';



            const selectElement = document.createElement('select'); //the select element is a dropdown input
            const gramsInput = document.createElement('input');
            gramsInput.className = 'gramsInput';
            gramsInput.type = 'number';
            gramsInput.placeholder = 'enter ingredient grams';
            gramsInput.min = 0;
            gramsInput.value = foods[0].weightSuggestion; 

            const caloriesDisplay = document.createElement('div');
            caloriesDisplay.className = 'caloriesDisplay';
            caloriesDisplay.textContent = foods[0].getCalories(foods[0].weightSuggestion) + ' calories';

            //delete button
            const deleteButton = document.createElement('button');
            deleteButton.className = 'deleteRowButton';
            deleteButton.textContent = 'X';

            row.appendChild(selectElement);
            row.appendChild(gramsInput);
            row.appendChild(caloriesDisplay);
            row.appendChild(deleteButton);

            deleteButton.addEventListener('click', () => {
                row.remove(); 
                 calculateTotalCalories();
            });

             selectElement.addEventListener('change', addWeightSuggestion); //when the user changes the selected food, we want to update the calories display

            gramsInput.addEventListener('input', updateRow); //when the user types in the grams input, we want to update the calories display

            function updateRow(){
                const selectedFood = foods[selectElement.selectedIndex]; //get the Food from the foods array that matches with the selected element in the dropdown
            
                const grams = gramsInput.value || 0; //get the value from the grams input OR if it's empty, use 0
                const calories = selectedFood.getCalories(grams); //calculate the calories using the getCalories method of the Food class
                 caloriesDisplay.textContent = Math.round(calories) + ' calories'; //update the calories display with the new calories

                 calculateTotalCalories();
            }

                function addWeightSuggestion(){
                    const selectedFood = foods[selectElement.selectedIndex]; //get the Food from the foods array that matches with the selected element in the dropdown
                    gramsInput.value = selectedFood.weightSuggestion; //update the grams input with the weight suggestion of the selected food
                    updateRow(); //also update the calories display, because we changed the grams input
                }

            foods.forEach(food => { //loop trough the foods array 
                const option = document.createElement("option"); //options are items in a drop down menu
                option.value = food.name; //setting the hidden value of each option
                option.textContent = food.name; //setting the visible value of each option
                selectElement.appendChild(option); //finally append to the select element
            })

            ingredients.appendChild(row);

            calculateTotalCalories();

        }

       
        //because we have an id called addIngredient, we can actually just refer to it like a variable, because the browser creates a global variable for each element with an id, so we can just do addIngredient instead of document.getElementById('addIngredient')
        //warning: this is not a good practice, because it can lead to bugs and confusion, because you might have a variable with the same name as an id, and then you won't know which one is which, so it's better to always use document.getElementById('id') to avoid confusion 
        btnAddIngredient.addEventListener('click', createIngredientRow);


        function calculateTotalCalories() {

            let total = 0;
            const ingredientRows = document.querySelectorAll('.ingredientRow'); //get all the ingredient rows

            console.log('ingredientRows: ', ingredientRows);

            ingredientRows.forEach(row => {

                //lets traverse a bit
                //traversing means moving through the DOM tree 
                const selectElement = row.querySelector('select'); //get the select element from the row
                const gramsInput = row.querySelector('.gramsInput'); //get the grams input from the row

                const selectedFood = foods[selectElement.selectedIndex]; //get the Food from the foods array that matches with the selected element in the dropdown

                const grams = gramsInput.value || 0; //get the value from the grams input OR if it's empty, use 0

                total += selectedFood.getCalories(grams); //calculate the calories using the getCalories method of the Food class and add it to the total


            }); /* Ends the forEach loop */
            
            totalCalories.textContent = 'Total calories: ' + Math.round(total); //update the total calories display with the new total

        }


        createIngredientRow();

        calculateTotalCalories();


    </script>

</body>

</html>
