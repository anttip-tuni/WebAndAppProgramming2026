<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        #recipeWrap {
            min-height: 20vh;
            background-color: #434343;
            color: white;
            border-radius: 0.2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }

        #ingredients {
            min-height: 10vh;
            background-color: white;
            width: 60%;
            color: black;
        }
    </style>

</head>

<body>

    <h1>Recipe maker</h1>

    <div id="recipeWrap">

        <input type="text" id="recipeName" placeholder="name of the recipe">

        <div id="ingredients">

            <div class="ingredientRow">

            </div>

        </div>
        <button id="addIngredient">+</button>

        <h2>Total calories: </h2>


    </div>

    <script>

        class Food {

            constructor(name, weightSuggestion, caloriesPerGram, protein, carbs, vegan, vegetarian, glutenFree, lactoseFree, carnivore) {

                this.name = name;
                this.weightSuggestion = weightSuggestion;
                this.caloriesPerGram = caloriesPerGram;
                this.protein = protein;
                this.carbs = carbs;
                this.vegan = vegan;
                this.vegetarian = vegetarian;
                this.glutenFree = glutenFree;
                this.lactoseFree = lactoseFree;
                this.carnivore = carnivore;

            }
        }

        const foods = [
            new Food('tomato', 150, 0.18, 0.009, 0, true, true, true, true, false),
            new Food('chicken breast', 200, 1.65, 0.31, 0, false, false, true, true, true),
            new Food('white rice', 180, 1.3, 0.027, 0, true, true, true, true, false),
            new Food('pasta', 180, 1.31, 0.05, 0, true, true, false, true, false),
            new Food('cheddar cheese', 50, 4.02, 0.25, 0, false, true, true, false, true),
            new Food('milk', 200, 0.42, 0.034, 0, false, true, true, false, true),
            new Food('egg', 60, 1.55, 0.13, 0, false, true, true, true, true),
            new Food('beef', 200, 2.5, 0.26, 0, false, false, true, true, true),
            new Food('salmon', 180, 2.08, 0.2, 0, false, false, true, true, true),
            new Food('potato', 200, 0.77, 0.02, 0, true, true, true, true, false),
            new Food('carrot', 100, 0.41, 0.009, 0, true, true, true, true, false),
            new Food('onion', 80, 0.4, 0.011, 0, true, true, true, true, false),
            new Food('bread', 80, 2.65, 0.09, 0, true, true, false, true, false),
            new Food('olive oil', 10, 8.84, 0, 0, true, true, true, true, false)
        ];

        const defaultRow = document.querySelector('.ingredientRow');

        const selectElement = document.createElement('select'); //the select element is a dropdown input

        defaultRow.appendChild(selectElement);

        foods.forEach(food => { //loop trough the foods array 
            const option = document.createElement("option"); //options are items in a drop down menu
            option.value = food.name; //setting the hidden value of each option
            option.textContent = food.name; //setting the visible value of each option
            selectElement.appendChild(option); //finally append to the select element
        })



    </script>

</body>

</html>
