<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn the Greek Alphabet</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 95vh;
        }

        #currentLetter {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>

</head>

<body>

    <h2>Choose the name of the Greek letter:</h2>
    <div id="currentLetter">A</div>
    <div id="answerChoices">
        <button class="answer-btn">Alpha</button>
        <button class="answer-btn">Beta</button>
        <button class="answer-btn">Gamma</button>
        <button class="answer-btn">Delta</button>
    </div>

    <script>

        let currentCorrectAnswer = '';

        let amountOfCorrectAnswersInARow = 0;

        //an array of objects representing the Greek letters and their names, or you could think about them as questions and their correct answers

        const greekLetters = [
            { letter: "A", name: "Alpha" },
            { letter: "B", name: "Beta" },
            { letter: "Γ", name: "Gamma" },
            { letter: "Δ", name: "Delta" },
            { letter: "E", name: "Epsilon" },
            { letter: "Z", name: "Zeta" },
            { letter: "H", name: "Eta" },
            { letter: "Θ", name: "Theta" },
            { letter: "I", name: "Iota" },
            { letter: "K", name: "Kappa" },
            { letter: "Λ", name: "Lambda" },
            { letter: "M", name: "Mu" },
            { letter: "N", name: "Nu" },
            { letter: "Ξ", name: "Xi" },
            { letter: "O", name: "Omicron" },
            { letter: "Π", name: "Pi" },
            { letter: "P", name: "Rho" },
            { letter: "Σ", name: "Sigma" },
            { letter: "T", name: "Tau" },
            { letter: "Y", name: "Upsilon" },
            { letter: "Φ", name: "Phi" },
            { letter: "X", name: "Chi" },
            { letter: "Ψ", name: "Psi" },
            { letter: "Ω", name: "Omega" }
        ];


 

        function handleAnswerClick(clickedButton) {

            //evaluate the answer:

            if (clickedButton === undefined){
                console.log('First time we run the handleAnswerClick is without any button press, so the clickedButton is undefined')
            } else {
                console.log('You clicked on the button called: ' + clickedButton.textContent);

                if (currentCorrectAnswer === clickedButton.textContent){
                    amountOfCorrectAnswersInARow++;
                    alert('Very good! Your streak is: ' + amountOfCorrectAnswersInARow);

                } else {
                    
                    alert('Not quite! Your streak was: ' + amountOfCorrectAnswersInARow);
                    amountOfCorrectAnswersInARow = 0;
                }
            }

            



            //start creating a new question:

            const currentLetterElement = document.getElementById("currentLetter");

            const answerChoices = document.getElementById("answerChoices");

            const randomNumber = Math.floor(Math.random() * greekLetters.length); //this will give us a random number between 0 and the length of the greekLetters array

            const randomlyChosenPair = greekLetters[randomNumber]; //we use the random number to select a random object from the greekLetters array, which will be our current question + answer pair 

            currentLetterElement.textContent = randomlyChosenPair.letter;

            //make the global variable know what the correct answer is for this question
            currentCorrectAnswer = randomlyChosenPair.name; 

            let answerOptions = [randomlyChosenPair.name]; //we start with an array that only contains the correct answer


            while (answerOptions.length < 4) { //keep adding random answers until we have 4 options in total

                const randomNumberForAnswerSelection = Math.floor(Math.random() * greekLetters.length);

                const randomlyChosenPairForAnswer = greekLetters[randomNumberForAnswerSelection];

                if (!answerOptions.includes(randomlyChosenPairForAnswer.name)) { //we are checking that the randomly chosen answer is not already in our answer options array, to avoid duplicates   

                    answerOptions.push(randomlyChosenPairForAnswer.name);


                }


            } //end while

            fisherYates(answerOptions); //randomize the "deck"

            const buttonsWrapper = document.createElement("div"); //we create a wrapper div for the buttons so that we can easily clear them later when we want to show the next question

            const btn1 = document.createElement("button");
            const btn2 = document.createElement("button");
            const btn3 = document.createElement("button");
            const btn4 = document.createElement("button");
            btn1.textContent = answerOptions[0];
            btn2.textContent = answerOptions[1];
            btn3.textContent = answerOptions[2];
            btn4.textContent = answerOptions[3];
            //at the bottom of the code file, we first tried some other options for adding event listeners to these buttons. 
            //remember how it was a but tricky to deal with the fact that these buttons dont exist on the page load after the first four buttons at least.
            //but here we are solving that difficulty by simply adding the evemt listeners to the buttons right when they are created 

            //this works, until you realise that you need to pass in parameters
            /*       
            btn1.addEventListener('click', handleAnswerClick);
            btn2.addEventListener('click', handleAnswerClick);
            btn3.addEventListener('click', handleAnswerClick);
            btn4.addEventListener('click', handleAnswerClick); 
            */

            //if we need to pass in arguments, we simply have to call the function inside an anonymous functions

            btn1.addEventListener('click', () => {
                handleAnswerClick(btn1);
            });
            btn2.addEventListener('click', () => {
                handleAnswerClick(btn2);
            });
            btn3.addEventListener('click', () => {
                handleAnswerClick(btn3);
            });
            btn4.addEventListener('click', () => {
                handleAnswerClick(btn4);
            });


            buttonsWrapper.appendChild(btn1);
            buttonsWrapper.appendChild(btn2);
            buttonsWrapper.appendChild(btn3);
            buttonsWrapper.appendChild(btn4);



            //for the homework, it might be a good idea to add event listeners to the buttons here, so that when the user clicks an answer, we can check if it's correct 

            answerChoices.innerHTML = ""; //we clear the previous answer choices, if there were any 

            answerChoices.appendChild(buttonsWrapper);
        }


        //call the function

        handleAnswerClick();

        //copy pasted fisher yates shuffle from stack overflow:

        function fisherYates(array) {
            var count = array.length,
                randomnumber,
                temp;
            while (count) {
                randomnumber = Math.random() * count-- | 0;
                temp = array[count];
                array[count] = array[randomnumber];
                array[randomnumber] = temp
            }
        }

        //this works once in the beginning, but after we regenerate four new buttons, they will no longer receive an event listener from here

       /*  const answerButtons = document.querySelectorAll('#answerChoices button');

        answerButtons.forEach((btn) => {

            btn.addEventListener('click', () => {
                
                handleAnswerClick();

            })
        }); */

        //an event delegation example

          /*   document.body.addEventListener('click', (e) => {
               
                if (e.target.tagName == 'BUTTON'){
                    
                    handleAnswerClick();
                }
                
            }) */
   




    </script>

</body>

</html>
