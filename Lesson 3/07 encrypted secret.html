<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Secret Vault</title>
    
    <!-- CryptoJS library for hashing (SHA256) and encryption (AES) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #004494; }
        pre {
            background: #2d2d2d;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            overflow-x: auto;
            font-size: 12px;
        }
        #decrypted-secret {
            margin-top: 20px;
            padding: 15px;
            background: #e6f4ea;
            border: 1px solid #34a853;
            border-radius: 5px;
            color: #137333;
            font-weight: bold;
            word-wrap: break-word;
        }
        #unlock-message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- ================= SETUP VIEW ================= -->
    <div id="setup-view" class="card" style="display: none;">
        <h2>🛠️ Setup Your Vault</h2>
        <p style="font-size: 14px; color: #555;">Generate your encrypted data to put into the code.</p>
        
        <textarea id="setup-secret" rows="3" placeholder="Enter your hidden secret here..."></textarea>
        <input type="password" id="setup-password" placeholder="Enter a password to lock it" />
        
        <button onclick="generateVault()">Generate Lock Data</button>
        
        <div id="setup-results" style="display: none;">
            <p style="font-size: 14px; margin-top: 20px;">Copy these values into your HTML file:</p>
            <pre id="setup-output"></pre>
        </div>
    </div>

    <!-- ================= UNLOCK VIEW ================= -->
    <div id="unlock-view" class="card" style="display: none;">
        <h2>🔒 Secret Vault</h2>
        <p style="font-size: 14px; color: #555;">Enter the password to decrypt the file.</p>
        
        <input type="password" id="unlock-password" placeholder="Password" />
        <br>
        <button onclick="unlockVault()">Unlock</button>
        
        <div id="unlock-message"></div>
        <div id="decrypted-secret" style="display:none;"></div>
    </div>

    <script>
        // ==========================================================
        // ⚙️ CONFIGURATION
        // Replace "SET_ME" with the values generated in Setup Mode.
        // ==========================================================
        const EXPECTED_HASH = "e3398b3a0f4ef78d179e3be0fc9b37ee52c317da9ecc63f274fbf34d35ce1bc1";
const ENCRYPTED_SECRET = "U2FsdGVkX186dWAZwhyzziZWF93zqHckaMkGbnyXNirroluZNgjA8vHCIbXn2QTRn9SD9dB8U3LJ/s7RCVa2Ow==";

        // Decide which view to show when the page loads
        window.onload = () => {
            if (EXPECTED_HASH === "SET_ME" || ENCRYPTED_SECRET === "SET_ME") {
                document.getElementById("setup-view").style.display = "block";
            } else {
                document.getElementById("unlock-view").style.display = "block";
            }
        };

        // --- Logic for generating the encrypted strings ---
        function generateVault() {
            const secret = document.getElementById("setup-secret").value;
            const password = document.getElementById("setup-password").value;

            if (!secret || !password) {
                alert("Please enter both a secret and a password.");
                return;
            }

            // Hash the password using SHA-256
            const hash = CryptoJS.SHA256(password).toString();
            
            // Encrypt the secret using AES
            const encrypted = CryptoJS.AES.encrypt(secret, password).toString();

            document.getElementById("setup-output").innerText = 
`const EXPECTED_HASH = "${hash}";\nconst ENCRYPTED_SECRET = "${encrypted}";`;
            document.getElementById("setup-results").style.display = "block";
        }

        // --- Logic for unlocking the vault ---
        function unlockVault() {
            const password = document.getElementById("unlock-password").value;
            const messageDiv = document.getElementById("unlock-message");
            const secretDiv = document.getElementById("decrypted-secret");

            // 1. Hash the inputted password and check it against our stored hash
            const inputHash = CryptoJS.SHA256(password).toString();

            if (inputHash !== EXPECTED_HASH) {
                messageDiv.innerText = "❌ Incorrect password!";
                messageDiv.style.color = "red";
                secretDiv.style.display = "none";
                return;
            }

            // 2. If the hash matches, decrypt the secret message using the password
            try {
                const decryptedBytes = CryptoJS.AES.decrypt(ENCRYPTED_SECRET, password);
                const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (!decryptedText) throw new Error("Decryption resulted in empty string");

                messageDiv.innerText = "✅ Password correct!";
                messageDiv.style.color = "green";
                
                secretDiv.innerText = decryptedText;
                secretDiv.style.display = "block";
            } catch (error) {
                messageDiv.innerText = "❌ Data is corrupted and cannot be decrypted.";
                messageDiv.style.color = "red";
                secretDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
